<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confluence News</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }

    article.post {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 6px;
      overflow: hidden;
    }

    article.post .post-body {
      display: none;
      margin-top: 10px;
    }

    article.post.expanded .post-body {
      display: block;
    }

    button.toggle-btn {
      margin-top: 10px;
      cursor: pointer;
      padding: 6px 12px;
    }
  </style>
</head>

<body>
  <h1>Latest News</h1>

  <!-- Blog -->
  <div id="blogList">Loading...</div>

<script>
const FUNCTION_URL="https://sourcebackend-cpetgwefcjc6auf0.swedencentral-01.azurewebsites.net/getBlogList?code=TSAgy19tOgBZCdyoAsH1VwX0OEDON2Q271Guphivp74XAzFusaCX2A==";

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleString();
  }

  async function loadBlogList() {
    const container = document.getElementById("blogList");

    try {
      const res = await fetch(FUNCTION_URL);
      if (!res.ok) {
        container.innerText = "Could not load news.";
        return;
      }

      const posts = await res.json();

      if (!posts.length) {
        container.innerText = "No posts yet.";
        return;
      }

      container.innerHTML = posts
        .map(
          (post, index) => `
        <article class="post ${index === 0 ? "expanded" : ""}">
          <h2>${post.title}</h2>
          <small>${formatDate(post.created)}</small>
          <div class="post-body">${post.html}</div>
          <button class="toggle-btn">
            ${index === 0 ? "Show less" : "Show more"}
          </button>
        </article>
      `
        )
        .join("");

      container.addEventListener("click", (e) => {
        if (e.target.classList.contains("toggle-btn")) {
          const postEl = e.target.closest(".post");
          const expanded = postEl.classList.toggle("expanded");
          e.target.textContent = expanded ? "Show less" : "Show more";
        }
      });
    } catch (err) {
      container.innerText = "Error loading posts.";
    }
  }

  loadBlogList();
</script>
